<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GamZ — Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#06070f;--bg2:#0d0f1e;--card:#13162b;--border:#1e2240;--accent:#e8392a;--accent2:#ff6b35;--neon:#00e5ff;--text:#e8eaf6;--text2:#8892b0;--glow:rgba(232,57,42,.35)}
[data-theme="light"]{--bg:#f0f2ff;--bg2:#e4e8ff;--card:#fff;--border:#c5cbf0;--text:#0d0f1e;--text2:#3a4060}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s}
nav{height:64px;background:rgba(6,7,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(16px,4vw,48px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.4rem;color:var(--accent);cursor:pointer;letter-spacing:2px}
.nav-logo span{color:var(--neon)}
.back-link{margin-left:auto;color:var(--text2);font-weight:600;font-size:.9rem;text-decoration:none;transition:color .3s}
.back-link:hover{color:var(--accent)}
.page{max-width:860px;margin:0 auto;padding:40px clamp(16px,4vw,40px)}
h1{font-family:'Orbitron',monospace;font-size:1.6rem;margin-bottom:8px}
h1 span{color:var(--accent)}
.sync-note{color:var(--text2);font-size:.85rem;margin-bottom:28px}
.sync-note.synced{color:#22c55e}
.cart-item{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px;transition:all .3s}
.item-logo{width:56px;height:56px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:.55rem;font-weight:900;text-align:center;padding:4px;flex-shrink:0}
.item-name{flex:1;font-weight:700;font-size:1.05rem}
.item-cat{font-size:.78rem;color:var(--text2);margin-top:2px}
.item-price{font-family:'Orbitron',monospace;color:var(--neon);font-weight:700;font-size:1.1rem;margin:0 16px}
.item-remove{background:none;border:2px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;transition:all .3s;display:flex;align-items:center;justify-content:center}
.item-remove:hover{border-color:var(--accent);color:var(--accent)}
.cart-summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-top:24px}
.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:1rem}
.summary-row:last-of-type{border-bottom:none;font-family:'Orbitron',monospace;font-size:1.2rem;color:var(--neon)}
.btn-checkout{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s;margin-top:16px}
.btn-checkout:hover{transform:scale(1.02);box-shadow:0 8px 24px var(--glow)}
.empty-cart{text-align:center;padding:80px 0;color:var(--text2)}
.empty-cart .icon{font-size:64px;margin-bottom:16px}
.empty-cart h3{font-family:'Orbitron',monospace;margin-bottom:10px;color:var(--text)}
.btn-shop{display:inline-block;margin-top:20px;padding:13px 32px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:10px;font-weight:700;font-family:'Orbitron',monospace;font-size:.9rem;cursor:pointer;transition:all .3s;border:none;letter-spacing:1px}
.btn-shop:hover{transform:scale(1.03);box-shadow:0 6px 20px var(--glow)}
.loading{text-align:center;padding:40px;color:var(--text2)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo" onclick="window.location='index.html'">GamZ<span>.</span></div>
  <a class="back-link" href="index.html" style="text-decoration:none">← Continue Shopping</a>
</nav>
<div class="page">
  <h1>Your <span>Cart</span> 🛒</h1>
  <p class="sync-note" id="syncNote">Loading your cart…</p>
  <div id="cartContent"><div class="loading">⏳ Fetching your cart…</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="gamz-firebase.js"></script>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('gamz_theme')||'dark');

const COLORS={1:["#ff00ff","#00ffff"],2:["#ff6b00","#ffcc00"],3:["#0055ff","#00ffcc"],4:["#ff4400","#ff8800"],5:["#aa00ff","#ff00aa"],6:["#5d4037","#ff6f00"],7:["#1a237e","#00e5ff"],8:["#263238","#00bcd4"],9:["#212121","#f44336"],10:["#1b5e20","#69f0ae"],11:["#e65100","#ffa726"],12:["#33691e","#cddc39"],13:["#0d47a1","#40c4ff"],14:["#1b5e20","#76ff03"],15:["#006064","#18ffff"],16:["#f57f17","#ffee58"],17:["#880e4f","#f48fb1"],18:["#1a237e","#448aff"],19:["#b71c1c","#ef9a9a"],20:["#4a148c","#ea80fc"],21:["#37474f","#76ff03"],22:["#b71c1c","#ff6d00"],23:["#4a148c","#e040fb"],24:["#1a237e","#ffd740"],25:["#006064","#00e5ff"]};

let cart = [];
const currentUser = gamzCurrentUser();

// ✅ Load cart from Firestore (synced across all devices)
async function init() {
  cart = await gamzLoadCart(currentUser?.email || null);
  const note = document.getElementById('syncNote');
  note.textContent = currentUser
    ? '✅ Cart synced across all your devices'
    : 'Sign in to sync your cart across devices';
  note.className = currentUser ? 'sync-note synced' : 'sync-note';
  render();
}

function render() {
  const el = document.getElementById('cartContent');
  if (!cart.length) {
    el.innerHTML = `<div class="empty-cart"><div class="icon">🛒</div><h3>Your cart is empty</h3><p>Add some awesome games to get started!</p><button class="btn-shop" onclick="window.location='index.html'">Browse Games</button></div>`;
    return;
  }
  const total = cart.reduce((s,i) => s+i.price, 0);
  el.innerHTML = cart.map(item => {
    const c = COLORS[item.id] || ["#333","#999"];
    return `<div class="cart-item">
      <div class="item-logo" style="background:linear-gradient(135deg,${c[0]}44,${c[1]}33);color:${c[1]}">${item.name.substring(0,8).toUpperCase()}</div>
      <div><div class="item-name">${item.name}</div><div class="item-cat">${item.cat||''}</div></div>
      <div class="item-price">₹${item.price}</div>
      <button class="item-remove" onclick="removeItem(${item.id})">✕</button>
    </div>`;
  }).join('') + `
  <div class="cart-summary">
    <div class="summary-row"><span>Items (${cart.length})</span><span>₹${total.toLocaleString('en-IN')}</span></div>
    <div class="summary-row"><span>Delivery</span><span style="color:var(--neon)">FREE (Digital)</span></div>
    <div class="summary-row"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>
    <button class="btn-checkout" onclick="checkout()">CHECKOUT — ₹${total.toLocaleString('en-IN')}</button>
  </div>`;
}

async function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  // ✅ Sync removal to Firestore
  await gamzSyncCart(currentUser?.email || null, cart);
  render();
}

function checkout() {
  if (!currentUser) { window.location.href = 'auth.html'; return; }
  alert('💳 Instamojo payment integration needed.\nSee README Step 5 for payment setup.\nFor individual games, use Buy Now from each game page.');
}

init();
</script>
</body>
</html>
